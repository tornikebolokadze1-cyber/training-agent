name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-railway
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Guard: never deploy while a lecture pipeline is running. Interrupting
      # an active Gemini transcription wastes ~$0.50 in phantom-billed input
      # tokens and leaves the pipeline in a half-finished state that
      # startup-recovery then has to redo from scratch. This gate polls the
      # public /healthz endpoint to confirm the server is responsive; if so,
      # the deploy proceeds. (The previous version called /health, which now
      # requires auth and so always returned "unreachable" — the gate became
      # a no-op silently. /healthz is unauthenticated by design and is the
      # right endpoint for a CI probe.) Pipeline-busy detection can be added
      # back later via a dedicated /idle endpoint or by reading /status with
      # an auth token configured as a deploy secret.
      - name: Verify server reachable before deploying
        if: github.event_name != 'workflow_dispatch'
        env:
          DEPLOY_URL: ${{ secrets.RAILWAY_PUBLIC_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "RAILWAY_PUBLIC_URL secret not set — skipping reachability gate"
            exit 0
          fi

          echo "Checking server reachability via /healthz..."
          OK=$(curl -sf --max-time 10 "$DEPLOY_URL/healthz" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('ok','unknown'))" \
            2>/dev/null || echo "unreachable")

          if [ "$OK" = "True" ] || [ "$OK" = "true" ]; then
            echo "Server reachable (/healthz ok=true) -- proceeding with deploy"
          elif [ "$OK" = "unreachable" ]; then
            echo "WARNING: /healthz unreachable -- proceeding anyway (cold start ok)"
          else
            echo "WARNING: /healthz returned unexpected payload (ok=$OK) -- proceeding"
          fi

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: railway up --service training-agent --detach

      - name: Wait for deployment liveness
        env:
          DEPLOY_URL: ${{ secrets.RAILWAY_PUBLIC_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "RAILWAY_PUBLIC_URL secret not set — skipping liveness verification"
            exit 0
          fi

          echo "Waiting for service to become live (/live probe)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf --max-time 8 "$DEPLOY_URL/live" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "alive" ]; then
              echo "Service is alive!"
              break
            fi
            echo "Attempt $i/30: status=$STATUS — waiting 10s..."
            sleep 10
            if [ "$i" = "30" ]; then
              echo "Service did not become live within 5 minutes"
              exit 1
            fi
          done

          # Post-deploy smoke test — deep health check (uses cached result, no extra API spend)
          echo "Running post-deploy smoke test (/health)..."
          HEALTH=$(curl -sf --max-time 15 "$DEPLOY_URL/health" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "unreachable")
          echo "Post-deploy health status: $HEALTH"
          if [ "$HEALTH" = "critical" ]; then
            echo "WARNING: post-deploy health is CRITICAL — check dependency status"
            exit 1
          fi
          echo "Deployment verified successfully (status=$HEALTH)"
