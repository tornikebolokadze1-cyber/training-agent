name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint and Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install ruff

      - name: Syntax check all tools/*.py files
        run: |
          echo "Running syntax check on tools/ modules..."
          for f in tools/*.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
          echo "All files passed syntax check."

      - name: Lint with ruff
        run: |
          ruff check tools/ --select E,W,F --ignore E501,E402

      - name: Security check — block sensitive files
        run: |
          FORBIDDEN=".env credentials.json token.json token_gmail.json attendees.json"
          FOUND=0
          for file in $FORBIDDEN; do
            if git ls-files --error-unmatch "$file" 2>/dev/null; then
              echo "BLOCKED: '$file' must not be committed to the repository."
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Sensitive files detected in the commit. Remove them and update .gitignore."
            exit 1
          fi
          echo "Security check passed — no sensitive files found."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        run: |
          if [ -d "tools/tests" ] && find tools/tests/ -name "*.py" | grep -q .; then
            python -m pytest tools/tests/ -v --tb=short
          else
            echo "No tools/tests directory found — skipping."
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Docker image
        run: docker build -t training-agent:ci .

      - name: Verify health check command
        run: |
          docker run --rm training-agent:ci python -c "import tools.server; print('Import OK')"
