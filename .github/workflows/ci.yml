name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    name: Lint and Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install linting tools
        run: pip install ruff

      - name: Syntax check all tools/*.py files
        run: |
          echo "Running syntax check on tools/ modules..."
          for f in tools/*.py; do
            echo "Checking $f"
            python -m py_compile "$f"
          done
          echo "All files passed syntax check."

      - name: Lint with ruff
        run: |
          ruff check tools/ --select E,W,F --ignore E501

      - name: Security check — block sensitive files
        run: |
          FORBIDDEN=".env credentials.json token.json token_gmail.json"
          FOUND=0
          for file in $FORBIDDEN; do
            if git ls-files --error-unmatch "$file" 2>/dev/null; then
              echo "BLOCKED: '$file' must not be committed to the repository."
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Sensitive files detected in the commit. Remove them and update .gitignore."
            exit 1
          fi
          echo "Security check passed — no sensitive files found."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d "tests" ] && find tests/ -name "*.py" | grep -q .; then
            pip install pytest
            python -m pytest tests/ -v
          else
            echo "No tests directory found — skipping. Add tests/ to enable this step."
          fi
